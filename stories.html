<!DOCTYPE html>

  <title>Persona Stories | ReLaunchHer</title>
  <meta name="description"
    content="Explore real comeback journeys and persona-driven demo modes for women returning to work." />
  <meta name="theme-color" content="#a44565" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="page-shell">
    <header class="site-header">
      <a class="brandmark" href="./index.html">ReLaunchHer</a>
      <nav class="main-nav">
        <a class="nav-link" href="./index.html" data-i18n="nav.home">Home</a>
        <a class="nav-link" href="./planner.html" data-i18n="nav.planner">Planner</a>
        <a class="nav-link" href="./dashboard.html" data-i18n="nav.dashboard">Dashboard</a>
        <a class="nav-link" href="./opportunities.html" data-i18n="nav.opportunities">Opportunities</a>

      <div class="header-tools">
        <div id="auth-slot" class="auth-slot"></div>
      </div>

    <main id="main-content">
      <section class="section-heading">

      <div id="story-filters" class="filter-row">
        <button class="filter-button is-active" type="button" data-filter="all">All</button>
        <button class="filter-button" type="button" data-filter="same-role">Same role</button>
        <button class="filter-button" type="button" data-filter="career-switch">Career switch</button>
        <button class="filter-button" type="button" data-filter="refresh">Skills refresh</button>
      </div>

      <section class="stories-layout">
        <div id="story-grid" class="story-grid"></div>
        <div id="story-detail" class="story-detail"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./stories.js"></script>
  <script src="./bg-animation.js" defer></script>
  <script src="./footer.js" defer></script>
  <script src="./transitions.js" defer></script>
