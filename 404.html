<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | ReLaunchHer</title>
    <meta name="description" content="The page you're looking for doesn't exist." />
    <meta name="theme-color" content="#a44565" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .not-found-shell {
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 32px 16px;
            text-align: center;
        }

        .nf-inner {
            max-width: 540px;
        }

        .nf-art {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .nf-digits {
            font-family: Georgia, serif;
            font-size: clamp(7rem, 22vw, 13rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--berry), var(--gold), var(--rose));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: nfPulse 3s ease-in-out infinite alternate;
            letter-spacing: -0.05em;
        }

        .nf-blossom {
            position: absolute;
            top: -18px;
            right: -14px;
            font-size: 2.4rem;
            animation: nfSpin 8s linear infinite;
            filter: drop-shadow(0 4px 12px rgba(164, 69, 101, 0.35));
        }

        .nf-heading {
            margin: 0 0 12px;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--ink);
        }

        .nf-sub {
            color: var(--ink-soft);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .nf-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .nf-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(60px);
            z-index: -1;
        }

        @keyframes nfPulse {
            from {
                opacity: 0.85;
                transform: scale(1);
            }

            to {
                opacity: 1;
                transform: scale(1.03);
            }
        }

        @keyframes nfSpin {
            from {
                transform: rotate(0deg) scale(1);
            }

            50% {
                transform: rotate(180deg) scale(1.2);
            }

            to {
                transform: rotate(360deg) scale(1);
            }
        }
    </style>
</head>

<body>
    <!-- decorative orbs -->
    <div class="nf-orb" style="width:400px;height:400px;top:5%;left:-8%;background:rgba(245,200,173,0.35)"></div>
    <div class="nf-orb" style="width:320px;height:320px;bottom:8%;right:-6%;background:rgba(216,137,157,0.28)"></div>
    <div class="nf-orb" style="width:240px;height:240px;top:55%;left:60%;background:rgba(196,162,218,0.22)"></div>

    <div class="not-found-shell">
        <div class="nf-inner">
            <div class="nf-art">
                <div class="nf-digits">404</div>
                <span class="nf-blossom" aria-hidden="true">🌸</span>
            </div>
            <h1 class="nf-heading">This page took a career break</h1>
            <p class="nf-sub">
                The page you were looking for has moved, or never existed.<br />
                No worries — your comeback journey continues from the home page.
            </p>
            <div class="nf-actions">
                <a class="primary-button" href="./index.html">Back to Home</a>
                <a class="secondary-button" href="./planner.html">Open Planner</a>
            </div>
        </div>
    </div>

    <script src="./bg-animation.js" defer></script>
</body>

</html>
